<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AIRTIS Psikotest | Pauli Kraepelin</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --surface:#ffffff;
      --surface-strong:#ffffff;
      --stroke:#e6e8ef;
      --stroke-soft:#edf0f6;
      --text:#0f172a;
      --muted:#5b6472;
      --accent:#1a73e8;
      --good:#0a7a2f;
      --bad:#b00020;
      --radius-xl:14px;
      --radius-md:12px;
      --shadow-soft:0 1px 2px rgba(0,0,0,.03);
      --shadow-key:none;
      --font-ui:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:var(--font-ui);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      text-rendering:optimizeLegibility;
      color:var(--text);
      background:var(--bg);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
    }

    .app{
      width:min(860px,100%);
      display:flex;
      flex-direction:column;
      gap:16px;
      animation:rise .45s ease-out;
    }

    .topbar{
      background:var(--surface);
      border:1px solid var(--stroke);
      border-radius:var(--radius-xl);
      padding:14px;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      box-shadow:var(--shadow-soft);
    }

    .stat{
      background:#fafbff;
      border:1px solid var(--stroke-soft);
      border-radius:12px;
      padding:10px 12px;
      display:flex;
      flex-direction:column;
      gap:3px;
      min-height:66px;
      justify-content:center;
    }

    .statLabel{
      font-size:12px;
      font-weight:510;
      color:var(--muted);
      letter-spacing:.2px;
    }

    .statValue{
      font-size:22px;
      font-weight:630;
      line-height:1;
      font-variant-numeric:tabular-nums;
    }

    .main{
      background:var(--surface);
      border:1px solid var(--stroke);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow-soft);
      padding:20px;
    }

    .questionWrap{
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:center;
    }

    .nums{
      margin-top:6px;
      background:var(--surface-strong);
      border:1px solid var(--stroke-soft);
      border-radius:14px;
      min-height:245px;
      width:min(360px,100%);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0;
      box-shadow:none;
    }

    .col{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      font-size:94px;
      line-height:.85;
      font-weight:650;
      letter-spacing:-1px;
      font-variant-numeric:tabular-nums;
    }

    .prompt{
      font-size:16px;
      color:var(--muted);
      text-align:center;
      margin-top:2px;
      font-weight:560;
      letter-spacing:.1px;
    }

    .feedback{
      height:18px;
      font-size:14px;
      color:var(--muted);
      font-weight:560;
      text-align:center;
    }

    .grid{
      width:min(430px,100%);
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:4px;
    }

    button.key{
      border:1px solid var(--stroke);
      height:66px;
      border-radius:12px;
      background:var(--surface-strong);
      color:var(--text);
      font-size:30px;
      font-weight:560;
      box-shadow:var(--shadow-key);
      cursor:pointer;
      user-select:none;
      transition:transform .08s ease, box-shadow .2s ease, background .2s ease;
    }

    button.key:hover{
      background:#fafbff;
    }

    button.key:active{
      transform:translateY(1px);
    }

    button.key.secondary{
      font-size:14px;
      font-weight:600;
      color:#334155;
      letter-spacing:.15px;
      background:#f8fafc;
    }

    .rowActions{
      width:min(640px,100%);
      margin-top:6px;
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
    }

    .btn{
      height:42px;
      border:1px solid #cdd2e6;
      border-radius:999px;
      background:#fff;
      color:#0f172a;
      font-size:13px;
      font-weight:600;
      box-shadow:var(--shadow-key);
      cursor:pointer;
      transition:transform .08s ease, box-shadow .2s ease;
    }

    .btn:active{transform:translateY(1px) scale(.99)}
    .btn:disabled{opacity:.5; cursor:not-allowed}
    .btn.good{background:var(--accent);border-color:var(--accent);color:#fff}
    .btn.bad{background:#fff;border-color:#fecaca;color:var(--bad)}
    .btn.ghost{background:#ffffff;color:#334155}

    .settings{
      width:100%;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-top:6px;
    }

    .field{
      background:var(--surface-strong);
      border:1px solid var(--stroke-soft);
      border-radius:var(--radius-md);
      padding:10px 12px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field label{
      font-size:12px;
      color:var(--muted);
      font-weight:560;
    }

    .field input{
      border:1px solid #d6d9e6;
      outline:none;
      background:#fff;
      border-radius:10px;
      padding:8px 10px;
      color:var(--text);
      font-size:15px;
      font-weight:560;
      min-height:24px;
    }

    .field input::placeholder{color:#94a3b8}

    .footerNote{
      width:100%;
      text-align:center;
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
    }

    .minuteCard{
      width:100%;
      background:var(--surface-strong);
      border:1px solid var(--stroke-soft);
      border-radius:var(--radius-md);
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .minuteHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      font-size:13px;
      font-weight:620;
      color:#334155;
      flex-wrap:wrap;
    }

    .minuteMeta{
      font-size:12px;
      font-weight:560;
      color:var(--muted);
    }

    .minuteLegend{
      display:flex;
      gap:12px;
      font-size:11px;
      color:var(--muted);
      font-weight:560;
    }

    .legendDot{
      display:inline-block;
      width:8px;
      height:8px;
      border-radius:99px;
      margin-right:4px;
      vertical-align:middle;
    }

    .minuteChart{
      width:100%;
      min-height:170px;
      display:grid;
      align-items:end;
      gap:5px;
      overflow-x:auto;
      padding-bottom:2px;
    }

    .minuteCol{
      min-width:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
    }

    .minuteBar{
      width:100%;
      height:128px;
      background:#f4f6fb;
      border-radius:8px;
      position:relative;
      overflow:hidden;
      border:1px solid var(--stroke);
    }

    .minuteGood,
    .minuteBad{
      position:absolute;
      left:0;
      width:100%;
      transition:height .2s ease;
    }

    .minuteGood{
      bottom:0;
      background:#22c55e;
    }

    .minuteBad{
      background:#ef4444;
    }

    .minuteCol.active .minuteBar{
      outline:2px solid rgba(26,115,232,.35);
      outline-offset:1px;
    }

    .minuteLabel{
      font-size:10px;
      color:#94a3b8;
      line-height:1;
      min-height:10px;
    }

    @keyframes rise{
      from{opacity:0; transform:translateY(8px)}
      to{opacity:1; transform:translateY(0)}
    }

    @media (max-width:760px){
      body{padding:14px}
      .topbar{grid-template-columns:1fr}
      .rowActions{grid-template-columns:repeat(2,minmax(0,1fr))}
      .settings{grid-template-columns:1fr}
      .col{font-size:78px}
      .nums{min-height:214px}
      button.key{height:62px; font-size:26px}
    }

    @media (max-width:420px){
      .main{padding:14px}
      .topbar{padding:10px}
      .col{font-size:70px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="stat">
        <div class="statLabel">Skor | Salah</div>
        <div class="statValue"><span id="score">0</span> | <span id="wrong">0</span></div>
      </div>
      <div class="stat">
        <div class="statLabel">Kolom | Sisa Kolom</div>
        <div class="statValue"><span id="col">1</span> | <span id="colLeft">60</span>s</div>
      </div>
      <div class="stat">
        <div class="statLabel">Sisa Total</div>
        <div class="statValue"><span id="totalLeft">1800</span>s</div>
      </div>
    </div>

    <div class="main">
      <div class="questionWrap">
        <div class="nums">
          <div class="col">
            <div id="a">6</div>
            <div id="b">7</div>
          </div>
        </div>

        <div class="prompt" id="prompt">Jumlahkan (ambil angka satuan)</div>
        <div class="feedback" id="feedback"></div>

        <div class="grid" id="keypad"></div>

        <div class="rowActions">
          <button class="btn good" id="startBtn">Mulai</button>
          <button class="btn ghost" id="pauseBtn" disabled>Pause</button>
          <button class="btn bad" id="stopBtn" disabled>Selesai</button>
          <button class="btn ghost" id="csvBtn" disabled>Download CSV</button>
        </div>

        <div class="settings">
          <div class="field">
            <label>Durasi total (detik) - fixed</label>
            <input id="totalDur" type="number" value="1800" readonly>
          </div>
          <div class="field">
            <label>Durasi per kolom (detik) - fixed</label>
            <input id="colDur" type="number" value="60" readonly>
          </div>
          <div class="field">
            <label>Seed (opsional, untuk konsisten)</label>
            <input id="seed" type="text" placeholder="contoh: session123">
          </div>
          <div class="field">
            <label>Nama peserta (opsional)</label>
            <input id="participant" type="text" placeholder="Nama">
          </div>
        </div>

        <div class="minuteCard">
          <div class="minuteHead">
            <span>Grafik Kinerja Per Menit</span>
            <span class="minuteMeta" id="minuteMeta">Menit 1/30</span>
          </div>
          <div class="minuteLegend">
            <span><i class="legendDot" style="background:#22c55e"></i>Benar</span>
            <span><i class="legendDot" style="background:#ef4444"></i>Salah</span>
          </div>
          <div class="minuteChart" id="minuteChart"></div>
        </div>

        <div class="footerNote">
          Input hanya angka satuan. Keyboard: 0-9, Backspace, Space (pause).
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  function xmur3(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return function() {
      h = Math.imul(h ^ (h >>> 16), 2246822507);
      h = Math.imul(h ^ (h >>> 13), 3266489909);
      return (h ^= (h >>> 16)) >>> 0;
    };
  }

  function mulberry32(a) {
    return function() {
      let t = (a += 0x6D2B79F5);
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const el = (id) => document.getElementById(id);
  const aEl = el("a");
  const bEl = el("b");
  const scoreEl = el("score");
  const wrongEl = el("wrong");
  const colEl = el("col");
  const colLeftEl = el("colLeft");
  const totalLeftEl = el("totalLeft");
  const feedbackEl = el("feedback");

  const startBtn = el("startBtn");
  const pauseBtn = el("pauseBtn");
  const stopBtn = el("stopBtn");
  const csvBtn = el("csvBtn");

  const totalDurInput = el("totalDur");
  const colDurInput = el("colDur");
  const seedInput = el("seed");
  const participantInput = el("participant");
  const minuteChartEl = el("minuteChart");
  const minuteMetaEl = el("minuteMeta");

  const keypad = el("keypad");
  const FIXED_TOTAL_SECONDS = 1800;
  const FIXED_COL_SECONDS = 60;

  const keys = ["1","2","3","4","5","6","7","8","9","DEL","0","START"];
  keys.forEach((k) => {
    const btn = document.createElement("button");
    btn.className = "key" + (k === "DEL" || k === "START" ? " secondary" : "");
    btn.textContent = k;
    btn.addEventListener("click", () => onKey(k));
    keypad.appendChild(btn);
  });

  let running = false;
  let paused = false;

  let score = 0;
  let wrong = 0;

  let colIndex = 1;
  let totalLeft = FIXED_TOTAL_SECONDS;
  let colLeft = FIXED_COL_SECONDS;

  let timer = null;

  let rng = Math.random;
  let curA = 0;
  let curB = 0;

  let lastShownAt = 0;
  let attempts = [];
  let minuteStats = [];

  function setFeedback(text, kind = "") {
    feedbackEl.textContent = text || "";
    if (kind === "good") {
      feedbackEl.style.color = getComputedStyle(document.documentElement).getPropertyValue("--good");
    } else if (kind === "bad") {
      feedbackEl.style.color = getComputedStyle(document.documentElement).getPropertyValue("--bad");
    } else {
      feedbackEl.style.color = getComputedStyle(document.documentElement).getPropertyValue("--muted");
    }
  }

  function randDigit() {
    return Math.floor(rng() * 10);
  }

  function nextPair() {
    curA = curB;
    curB = randDigit();
    aEl.textContent = curA;
    bEl.textContent = curB;
    lastShownAt = performance.now();
  }

  function currentAnswer() {
    return (curA + curB) % 10;
  }

  function updateHUD() {
    scoreEl.textContent = score;
    wrongEl.textContent = wrong;
    colEl.textContent = colIndex;
    colLeftEl.textContent = colLeft;
    totalLeftEl.textContent = totalLeft;
  }

  function currentMinuteIndex() {
    const elapsed = Math.max(0, FIXED_TOTAL_SECONDS - totalLeft);
    return Math.min(minuteStats.length - 1, Math.floor(elapsed / 60));
  }

  function initMinuteStats() {
    const totalMinutes = Math.ceil(FIXED_TOTAL_SECONDS / 60);
    minuteStats = Array.from({ length: totalMinutes }, (_, i) => ({
      minute: i + 1,
      correct: 0,
      wrong: 0,
      total: 0
    }));
  }

  function renderMinuteChart() {
    if (!minuteStats.length) return;

    const maxTotal = Math.max(1, ...minuteStats.map((m) => m.total));
    const activeIdx = currentMinuteIndex();

    minuteChartEl.style.gridTemplateColumns = "repeat(" + minuteStats.length + ", minmax(14px, 1fr))";
    minuteChartEl.innerHTML = minuteStats.map((m, idx) => {
      const total = m.total || 0;
      const goodHeight = total ? Math.round((m.correct / maxTotal) * 100) : 0;
      const badHeight = total ? Math.round((m.wrong / maxTotal) * 100) : 0;
      const badBottom = goodHeight;
      const activeClass = (running && !paused && idx === activeIdx) ? " active" : "";
      const label = (m.minute === 1 || m.minute % 5 === 0 || m.minute === minuteStats.length) ? String(m.minute) : "";

      return (
        "<div class=\"minuteCol" + activeClass + "\">" +
          "<div class=\"minuteBar\">" +
            "<div class=\"minuteGood\" style=\"height:" + goodHeight + "%\"></div>" +
            "<div class=\"minuteBad\" style=\"height:" + badHeight + "%;bottom:" + badBottom + "%\"></div>" +
          "</div>" +
          "<div class=\"minuteLabel\">" + label + "</div>" +
        "</div>"
      );
    }).join("");

    const active = minuteStats[activeIdx] || { minute: 1, correct: 0, wrong: 0 };
    minuteMetaEl.textContent = "Menit " + active.minute + "/" + minuteStats.length + " | Benar " + active.correct + " | Salah " + active.wrong;
  }

  function enableControls() {
    startBtn.disabled = running && !paused;
    pauseBtn.disabled = !running;
    stopBtn.disabled = !running;
    csvBtn.disabled = attempts.length === 0;
    pauseBtn.textContent = paused ? "Lanjut" : "Pause";
  }

  function start() {
    score = 0;
    wrong = 0;
    colIndex = 1;

    totalDurInput.value = FIXED_TOTAL_SECONDS;
    colDurInput.value = FIXED_COL_SECONDS;
    totalLeft = FIXED_TOTAL_SECONDS;
    colLeft = FIXED_COL_SECONDS;

    const seedStr = (seedInput.value || "").trim();
    if (seedStr) {
      const seedFn = xmur3(seedStr);
      rng = mulberry32(seedFn());
    } else {
      rng = Math.random;
    }

    curA = randDigit();
    curB = randDigit();
    aEl.textContent = curA;
    bEl.textContent = curB;
    lastShownAt = performance.now();

    attempts = [];
    initMinuteStats();
    running = true;
    paused = false;

    setFeedback("Tes dimulai.", "good");
    enableControls();

    tick();
    timer = setInterval(tick, 1000);
    renderMinuteChart();
  }

  function stop(reason = "Selesai") {
    running = false;
    paused = false;
    if (timer) clearInterval(timer);
    timer = null;

    setFeedback(reason + ". Jawaban benar: " + score + ", salah: " + wrong + ".", "");
    renderMinuteChart();
    enableControls();
    csvBtn.disabled = attempts.length === 0;
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    setFeedback(paused ? "Pause." : "Lanjut.", paused ? "" : "good");
    renderMinuteChart();
    enableControls();
  }

  function tick() {
    if (!running || paused) return;

    totalLeft -= 1;
    colLeft -= 1;

    if (colLeft <= 0) {
      colIndex += 1;
      colLeft = FIXED_COL_SECONDS;
      setFeedback("Pindah kolom ke-" + colIndex, "");
    }

    if (totalLeft <= 0) {
      updateHUD();
      stop("Waktu habis");
      return;
    }

    updateHUD();
    renderMinuteChart();
  }

  function logAttempt(userInput, correct) {
    const now = performance.now();
    const rt = Math.max(0, Math.round(now - lastShownAt));
    const elapsedSec = Math.max(0, FIXED_TOTAL_SECONDS - totalLeft);
    const minuteIndex = Math.min(minuteStats.length - 1, Math.floor(elapsedSec / 60));
    const minuteValue = minuteIndex + 1;

    if (minuteStats[minuteIndex]) {
      minuteStats[minuteIndex].total += 1;
      if (correct) minuteStats[minuteIndex].correct += 1;
      else minuteStats[minuteIndex].wrong += 1;
    }

    attempts.push({
      ts_iso: new Date().toISOString(),
      participant: (participantInput.value || "").trim(),
      seed: (seedInput.value || "").trim(),
      col: colIndex,
      minute: minuteValue,
      elapsed_sec: elapsedSec,
      a: curA,
      b: curB,
      expected: currentAnswer(),
      input: userInput,
      correct: correct ? 1 : 0,
      reaction_ms: rt
    });
  }

  function onAnswer(digit) {
    if (!running || paused) return;

    const expected = currentAnswer();
    const correct = digit === expected;
    logAttempt(digit, correct);

    if (correct) {
      score += 1;
      setFeedback("Benar", "good");
    } else {
      wrong += 1;
      setFeedback("Salah (seharusnya " + expected + ")", "bad");
    }

    nextPair();
    updateHUD();
    renderMinuteChart();
    csvBtn.disabled = attempts.length === 0;
  }

  function onKey(k) {
    if (k === "DEL") {
      setFeedback("Backspace tidak dipakai untuk mode 1 digit.", "");
      return;
    }

    if (k === "START") {
      if (!running) start();
      else setFeedback("Tes sedang berjalan.", "");
      return;
    }

    if (/^\d$/.test(k)) onAnswer(parseInt(k, 10));
  }

  function toCSV(rows) {
    if (!rows.length) return "";

    const headers = Object.keys(rows[0]);
    const esc = (val) => {
      const s = String(val ?? "");
      if (/[",\n]/.test(s)) return '"' + s.replaceAll('"', '""') + '"';
      return s;
    };

    const lines = [];
    lines.push(headers.map(esc).join(","));
    for (const row of rows) {
      lines.push(headers.map((h) => esc(row[h])).join(","));
    }
    return lines.join("\n");
  }

  function downloadCSV() {
    const csv = toCSV(attempts);
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    const name = (participantInput.value || "peserta").trim().replace(/\s+/g, "_");
    a.href = url;
    a.download = "kraepelin_" + (name || "hasil") + "_" + Date.now() + ".csv";

    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  startBtn.addEventListener("click", start);
  pauseBtn.addEventListener("click", togglePause);
  stopBtn.addEventListener("click", () => stop("Tes dihentikan"));
  csvBtn.addEventListener("click", downloadCSV);

  document.addEventListener("keydown", (e) => {
    if (e.key >= "0" && e.key <= "9") onAnswer(parseInt(e.key, 10));
    else if (e.key === "Backspace") onKey("DEL");
    else if (e.key === " ") {
      e.preventDefault();
      togglePause();
    }
  });

  totalDurInput.value = FIXED_TOTAL_SECONDS;
  colDurInput.value = FIXED_COL_SECONDS;
  initMinuteStats();
  totalLeftEl.textContent = totalDurInput.value;
  colLeftEl.textContent = colDurInput.value;
  updateHUD();
  renderMinuteChart();
  setFeedback("Durasi fixed 30 menit. Klik Mulai untuk mulai tes.", "");
  enableControls();
})();
</script>
  <script>
    (function () {
      try {
        const session = JSON.parse(localStorage.getItem("HRRS_SESSION") || "null");
        if (!session || !session.candidate) return;

        const candidate = session.candidate || {};
        const participantEl = document.getElementById("participant");
        const seedEl = document.getElementById("seed");

        if (participantEl && !participantEl.value) participantEl.value = candidate.name || "";
        if (seedEl && !seedEl.value) seedEl.value = session.token || "";
      } catch (error) {
        console.warn("Gagal sinkron data kandidat ke Kraepelin", error);
      }
    })();
  </script>
</body>
</html>
