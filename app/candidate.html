<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AIRTIS Psikotest - Biodata</title>
  <link rel="stylesheet" href="assets/css/app.css"/>
</head>
<body>
  <main class="container">
    <div class="card">
      <h1>Biodata Kandidat</h1>
      <div class="small">Lengkapi biodata lalu pilih jenis tes yang akan dijalankan.</div>
      <div id="error-box" class="error"></div>
      <form id="candidate-form">
        <label>Nama</label>
        <input id="name" type="text" placeholder="Nama lengkap" />

        <div class="row2">
          <div>
            <label>No HP (opsional)</label>
            <input id="phone" type="text" placeholder="08xxxxxxxxxx" />
          </div>
          <div>
            <label>Posisi (opsional)</label>
            <input id="position" type="text" placeholder="Contoh: Staff HR" />
          </div>
        </div>

        <div class="row2">
          <div>
            <label>Jenis Kelamin</label>
            <select id="gender">
              <option value="">-</option>
              <option value="L">Laki-laki</option>
              <option value="P">Perempuan</option>
            </select>
          </div>
          <div>
            <label>Usia</label>
            <input id="age" type="number" min="10" max="80" placeholder="Contoh: 25" />
          </div>
        </div>

        <div>
          <label>Jenis Tes</label>
          <select id="testType">
            <option value="disc">DISC</option>
            <option value="iq">IQ / IST</option>
            <option value="spm">SPM Raven</option>
            <option value="kraepelin">Pauli Kraepelin</option>
          </select>
        </div>

        <div style="margin-top:14px;">
          <button class="btn primary" type="submit">Lanjut ke Tes</button>
        </div>
      </form>
    </div>
  </main>

  <script type="module" src="assets/js/pages/candidate.page.js"></script>
</body>
</html>
