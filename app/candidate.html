<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>AIRTIS Psikotest - Biodata</title>
  <link rel="stylesheet" href="assets/css/app.css?v=20260408-2"/>
</head>
<body class="auth-page">
  <main class="container auth-container">
    <div class="card auth-card">
      <h1>Biodata Kandidat</h1>
      <div class="small">Lengkapi biodata. Setelah klik lanjut, kandidat akan mengerjakan tes berurutan: DISC, SPM Raven, lalu Pauli Kraepelin.</div>
      <div id="error-box" class="error"></div>
      <form id="candidate-form">
        <label>Nama</label>
        <input id="name" type="text" placeholder="Nama lengkap" />

        <div class="row2">
          <div>
            <label>No HP (opsional)</label>
            <input id="phone" type="text" placeholder="08xxxxxxxxxx" />
          </div>
          <div>
            <label>Posisi (opsional)</label>
            <input id="position" type="text" placeholder="Contoh: Staff HR" />
          </div>
        </div>

        <div class="row2">
          <div>
            <label>Jenis Kelamin</label>
            <select id="gender">
              <option value="">-</option>
              <option value="L">Laki-laki</option>
              <option value="P">Perempuan</option>
            </select>
          </div>
          <div>
            <label>Usia</label>
            <input id="age" type="number" min="10" max="80" placeholder="Contoh: 25" />
          </div>
        </div>

        <div style="margin-top:14px;">
          <button class="btn primary" type="submit">Lanjut ke Tes</button>
        </div>
      </form>
    </div>
  </main>

  <script type="module" src="assets/js/pages/candidate.page.js"></script>
</body>
</html>
